<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamilyOS Autofill</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>FamilyOS</h1>

    <!-- Login Section -->
    <div id="login-section">
      <p class="subtitle">Sign in to autofill forms</p>
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <button id="login-btn" class="btn btn-primary">Sign In</button>
      <p id="login-error" class="error"></p>
    </div>

    <!-- Autofill Section (shown after login) -->
    <div id="autofill-section" style="display: none;">
      <p class="subtitle">Signed in as <span id="user-email"></span></p>
      <button id="autofill-btn" class="btn btn-primary">Autofill This Page</button>
      <div id="status" class="status"></div>
      <button id="logout-btn" class="btn btn-secondary">Sign Out</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
