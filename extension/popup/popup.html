<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FamilyOS Autofill</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <h1>FamilyOS Autofill</h1>
      <p class="subtitle">Precision-first autofill</p>

      <div class="controls">
        <button id="scan-btn" class="btn primary">Scan this form</button>
        <button id="apply-btn" class="btn" disabled>Apply selected</button>
      </div>

      <section class="mock-panel">
        <label class="mock-toggle">
          <input id="mock-mode-toggle" type="checkbox" />
          <span>Use demo mocks</span>
        </label>
        <p class="mock-help">Works on local fixtures and live forms without the backend.</p>
      </section>

      <section>
        <h2>Suggestions</h2>
        <ul id="suggestion-list" class="suggestions"></ul>
      </section>

      <p id="status" class="status"></p>
    </main>
    <script src="../shared/field_normalization.js"></script>
    <script src="../shared/confidence.js"></script>
    <script src="../shared/autofill_runtime.js"></script>
    <script src="../shared/feedback_queue.js"></script>
    <script src="../shared/mock_autofill.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
